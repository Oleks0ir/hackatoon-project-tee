<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with a smooth gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Wheat / Kolosok graphic -->
  <g transform="translate(256, 260) scale(1.8)" fill="url(#goldGrad)" stroke="#eab308" stroke-width="1">
    <!-- Stem -->
    <path d="M 0,90 L 0,-60" stroke="url(#goldGrad)" stroke-width="4" />
    
    <!-- Grains -->
    <!-- Center top -->
    <path d="M 0,-60 C -10,-75 0,-90 0,-90 C 0,-90 10,-75 0,-60 Z" />
    
    <!-- Row 1 -->
    <path d="M 0,-40 C -20,-55 -30,-40 -10,-30 Z" />
    <path d="M 0,-40 C 20,-55 30,-40 10,-30 Z" />
    
    <!-- Row 2 -->
    <path d="M 0,-15 C -25,-30 -35,-15 -10,-5 Z" />
    <path d="M 0,-15 C 25,-30 35,-15 10,-5 Z" />
    
    <!-- Row 3 -->
    <path d="M 0,10 C -25,-5 -35,10 -10,20 Z" />
    <path d="M 0,10 C 25,-5 35,10 10,20 Z" />
    
    <!-- Row 4 -->
    <path d="M 0,35 C -25,20 -35,35 -10,45 Z" />
    <path d="M 0,35 C 25,20 35,35 10,45 Z" />
    
    <!-- Row 5 -->
    <path d="M 0,60 C -20,45 -30,60 -10,70 Z" />
    <path d="M 0,60 C 20,45 30,60 10,70 Z" />
  </g>
</svg>
